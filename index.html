<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Prompt Saver</title>

<style>
body {
  font-family: Arial, sans-serif;
  max-width: 800px;
  margin: 40px auto;
  padding: 20px;
  background: #f8fafc;
}

h1 {
  color: #1e293b;
}

textarea {
  width: 100%;
  height: 120px;
  padding: 10px;
}

button {
  background: #2563eb;
  color: white;
  border: none;
  padding: 10px 16px;
  cursor: pointer;
  border-radius: 6px;
  margin-right: 5px;
}

.card {
  background: white;
  padding: 12px;
  margin-top: 12px;
  border-radius: 8px;
  box-shadow: 0 1px 3px rgba(0,0,0,.1);
}
</style>

</head>
<body>

<h1>Prompt Saver</h1>

<textarea id="prompt" placeholder="Write your prompt..."></textarea>
<br><br>

<button onclick="savePrompt()">Save</button>

<h2>Saved Prompts</h2>
<div id="list"></div>

<script>
let prompts = JSON.parse(localStorage.getItem("prompts") || "[]");

function copyPrompt(text) {
  navigator.clipboard.writeText(text);
  alert("Prompt copied!");
}

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  prompts.forEach((p, i) => {
    list.innerHTML += `
      <div class="card">
        ${p}
        <br><br>
        <button onclick="copyPrompt(\`${p}\`)">Copy</button>
        <button onclick="deletePrompt(${i})">Delete</button>
      </div>
    `;
  });
}

function savePrompt() {
  const value = document.getElementById("prompt").value;
  if (!value) return;

  prompts.push(value);
  localStorage.setItem("prompts", JSON.stringify(prompts));

  document.getElementById("prompt").value = "";
  render();
}

function deletePrompt(i) {
  prompts.splice(i, 1);
  localStorage.setItem("prompts", JSON.stringify(prompts));
  render();
}

render();
</script>

</body>
</html>
