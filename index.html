<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Prompt Saver Pro Dashboard</title>

<style>
body {
  font-family: Arial;
  max-width: 900px;
  margin: auto;
  padding: 20px;
  background: #f6f7fb;
}

h1 {
  text-align: center;
}

.hidden {
  display: none;
}

.card {
  background: white;
  padding: 15px;
  margin-top: 10px;
  border-radius: 12px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.1);
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
}

button {
  padding: 10px 14px;
  margin: 5px 5px 5px 0;
  border: none;
  background: #2563eb;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: white;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 15px;
}
</style>

</head>

<body>

<h1>🚀 Prompt Saver SaaS</h1>

<!-- LOGIN SECTION -->
<div id="authBox" class="card">
  <h3>Login / Register</h3>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="appBox" class="hidden">

  <div class="topbar">
    <div id="userInfo">👤 Logged in</div>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="card">
    <textarea id="prompt" placeholder="Write your prompt..."></textarea>
    <button onclick="savePrompt()">Save Prompt</button>
  </div>

  <h3>Your Prompts</h3>
  <div id="list"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  query,
  where
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* 🔥 Firebase Config */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_BUCKET",
  messagingSenderId: "YOUR_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;

/* ================= AUTH ================= */

window.register = async () => {
  const email = emailEl().value;
  const pass = passEl().value;
  await createUserWithEmailAndPassword(auth, email, pass);
};

window.login = async () => {
  const email = emailEl().value;
  const pass = passEl().value;
  await signInWithEmailAndPassword(auth, email, pass);
};

window.logout = async () => {
  await signOut(auth);
};

/* ================= SAVE ================= */

window.savePrompt = async () => {
  const text = document.getElementById("prompt").value;

  if (!currentUser) return alert("Login first!");
  if (!text) return;

  await addDoc(collection(db, "prompts"), {
    text,
    userId: currentUser.uid,
    createdAt: Date.now()
  });

  document.getElementById("prompt").value = "";
  loadPrompts();
};

/* ================= LOAD ================= */

async function loadPrompts() {
  if (!currentUser) return;

  const q = query(collection(db, "prompts"), where("userId", "==", currentUser.uid));
  const snap = await getDocs(q);

  const list = document.getElementById("list");
  list.innerHTML = "";

  snap.forEach(doc => {
    const p = doc.data();

    list.innerHTML += `
      <div class="card">
        ${p.text}
      </div>
    `;
  });
}

/* ================= AUTH STATE ================= */

onAuthStateChanged(auth, (user) => {
  currentUser = user;

  if (user) {
    document.getElementById("authBox").classList.add("hidden");
    document.getElementById("appBox").classList.remove("hidden");

    document.getElementById("userInfo").innerText =
      "👤 " + user.email;

    loadPrompts();
  } else {
    document.getElementById("authBox").classList.remove("hidden");
    document.getElementById("appBox").classList.add("hidden");
  }
});

/* helpers */
function emailEl() {
  return document.getElementById("email");
}

function passEl() {
  return document.getElementById("password");
}

</script>

</body>
</html>
