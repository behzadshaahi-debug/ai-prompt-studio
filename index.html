<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Prompt Saver SaaS</title>

<style>
body {
  font-family: Arial;
  max-width: 900px;
  margin: auto;
  padding: 20px;
  background: #f6f7fb;
}

.card {
  background: white;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
}

button {
  padding: 10px 14px;
  margin: 5px 5px 5px 0;
  border: none;
  background: #2563eb;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

.top {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
</style>

</head>

<body>

<h1>🚀 Prompt Saver SaaS</h1>

<!-- LOGIN -->
<div class="card" id="authBox">
  <h3>Login / Register</h3>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="appBox" style="display:none">

  <div class="top">
    <p id="userInfo">User</p>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="card">
    <textarea id="prompt" placeholder="Write your prompt..."></textarea>
    <button onclick="savePrompt()">Save Prompt</button>
  </div>

  <h3>Your Prompts</h3>
  <div id="list"></div>

</div>

<script>
let currentUser = null;

/* ================= AUTH ================= */

async function register() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const res = await fetch("http://localhost:3000/register", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({email, password})
  });

  alert(await res.text());
}

async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const res = await fetch("http://localhost:3000/login", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({email, password})
  });

  const data = await res.json();

  if (data.userId) {
    currentUser = data.userId;
    document.getElementById("authBox").style.display = "none";
    document.getElementById("appBox").style.display = "block";
    loadPrompts();
  }
}

async function logout() {
  currentUser = null;
  document.getElementById("authBox").style.display = "block";
  document.getElementById("appBox").style.display = "none";
}

/* ================= PROMPTS ================= */

async function savePrompt() {
  const text = document.getElementById("prompt").value;

  await fetch("http://localhost:3000/prompts", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({text, userId: currentUser})
  });

  document.getElementById("prompt").value = "";
  loadPrompts();
}

async function loadPrompts() {
  const res = await fetch(`http://localhost:3000/prompts?userId=${currentUser}`);
  const data = await res.json();

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(p => {
    list.innerHTML += `<div class="card">${p.text}</div>`;
  });
}
</script>

</body>
</html>
