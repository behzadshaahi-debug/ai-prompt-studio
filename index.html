<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Prompt Saver SaaS</title>

<style>
body {
  font-family: Arial;
  max-width: 900px;
  margin: 40px auto;
  padding: 20px;
  background: #f8fafc;
}

h1 {
  margin-bottom: 10px;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  box-sizing: border-box;
}

button {
  padding: 10px 14px;
  margin: 5px 5px 5px 0;
  background: #2563eb;
  color: white;
  border: none;
  cursor: pointer;
  border-radius: 6px;
}

.card {
  background: white;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}
</style>

</head>

<body>

<h1>🚀 Prompt Saver SaaS</h1>

<!-- AUTH -->
<h3>Authentication</h3>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>

<hr>

<!-- APP -->
<textarea id="prompt" placeholder="Write your prompt..."></textarea>
<button onclick="savePrompt()">Save Prompt</button>

<h2>Saved Prompts</h2>
<div id="list"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  query,
  where
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* 🔥 YOUR FIREBASE CONFIG (FROM YOUR PROJECT) */
const firebaseConfig = {
  apiKey: "AIzaSyBHa_tOUJ4Mcksqnf5BTHKCrql-DqJRWac",
  authDomain: "prompt-server-pro.firebaseapp.com",
  projectId: "prompt-server-pro",
  storageBucket: "prompt-server-pro.appspot.com",
  messagingSenderId: "628065017292",
  appId: "1:628065017292:web:c90311c5702738bb611169"
};

/* INIT */
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;

/* ================= AUTH ================= */

window.register = async function () {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  await createUserWithEmailAndPassword(auth, email, pass);
};

window.login = async function () {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  await signInWithEmailAndPassword(auth, email, pass);
};

window.logout = async function () {
  await signOut(auth);
};

/* ================= SAVE PROMPT ================= */

window.savePrompt = async function () {
  const text = document.getElementById("prompt").value;

  if (!currentUser) {
    alert("Please login first");
    return;
  }

  if (!text) return;

  await addDoc(collection(db, "prompts"), {
    text: text,
    userId: currentUser.uid,
    createdAt: Date.now()
  });

  document.getElementById("prompt").value = "";
  loadPrompts();
};

/* ================= LOAD PROMPTS ================= */

async function loadPrompts() {
  if (!currentUser) return;

  const q = query(
    collection(db, "prompts"),
    where("userId", "==", currentUser.uid)
  );

  const snap = await getDocs(q);

  const list = document.getElementById("list");
  list.innerHTML = "";

  snap.forEach((doc) => {
    const p = doc.data();

    list.innerHTML += `
      <div class="card">
        ${p.text}
      </div>
    `;
  });
}

/* ================= AUTH STATE ================= */

onAuthStateChanged(auth, (user) => {
  currentUser = user;

  if (user) {
    loadPrompts();
  } else {
    document.getElementById("list").innerHTML = "";
  }
});

</script>

</body>
</html>
